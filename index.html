<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Martinez Routing - Control Central</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

    <header class="app-header">
        <nav class="app-navbar" aria-label="Navegación principal del sistema">
            <div class="app-navbar__brand">Martinez Routing Central</div>
            <div class="app-navbar__menu">
                <a href="index.html" class="app-navbar__link app-navbar__link--active" aria-current="page">Inicio</a>
                <a href="pages/dashboard.html" class="app-navbar__link">Panel de Carga</a>
                <a href="pages/shipping.html" class="app-navbar__link">Consola Mapa</a>
                <a href="pages/transporte.html" class="app-navbar__link">Flota</a>
                <a href="pages/administracion.html" class="app-navbar__link">Seguridad</a>
            </div>
        </nav>
    </header>

    <main class="dashboard-view">
        <section class="dashboard-view__kpi-grid" aria-label="Indicadores clave de rendimiento operativo">
            <div class="card-panel kpi-card">
                <span class="kpi-card__label">Pedidos de la Jornada</span>
                <strong id="kpi-pedidos" class="kpi-card__value kpi-card__value--default">0</strong>
            </div>
            <div class="card-panel kpi-card">
                <span class="kpi-card__label">Unidades Desplegadas</span>
                <strong id="kpi-unidades" class="kpi-card__value kpi-card__value--info">0</strong>
            </div>
            <div class="card-panel kpi-card">
                <span class="kpi-card__label">Alertas por Horas Extras</span>
                <strong id="kpi-extras" class="kpi-card__value kpi-card__value--danger">0</strong>
            </div>
        </section>

        <section class="dashboard-view__main-panel" aria-label="Alertas prioritarias">
            <div class="card-panel">
                <h2 class="card-panel__title">⚠️ Top 10 Clientes Críticos con Reclamos Pendientes</h2>
                <div id="append-kpi-criticos" class="list-scroll-box" role="region" aria-live="polite">
                    </div>
            </div>
        </section>
    </main>

    <script type="module" src="./js/app.js"></script>
    <script type="module" src="./js/controllers/indexController.js"></script>
</body>
</html>
