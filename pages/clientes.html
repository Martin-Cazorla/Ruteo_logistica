<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Martinez Routing - Fichero Maestro de Clientes</title>
    <link rel="stylesheet" href="../css/main.css">
</head>
<body>

    <header class="app-header">
        <nav class="app-navbar" aria-label="Navegación del sistema">
            <div class="brand-title">Martinez Routing Clientes</div>
            <div class="dashboard-counters">
                <a href="../index.html" class="nav-link">Inicio</a>
                <a href="dashboard.html" class="nav-link">Panel de Carga</a>
                <a href="shipping.html" class="nav-link">Consola Mapa</a>
                <a href="transporte.html" class="nav-link">Flota</a>
                <a href="clientes.html" class="nav-link nav-link--active">Clientes</a>
                <a href="administracion.html" class="nav-link">Seguridad</a>
            </div>
        </nav>
    </header>

    <main class="dashboard-container">
        <div class="grid-two-columns">
            
            <section class="card-panel" aria-labelledby="form-clientes-title">
                <h3 id="form-clientes-title" class="section-title">Registro Maestro de Clientes</h3>
                
                <form id="form-cliente-operativo" class="form-vertical">
                    <input type="hidden" id="cliente-id-hidden">

                    <div class="form-group">
                        <label for="c-dni">Documento Nacional de Identidad (DNI):</label>
                        <input type="text" id="c-dni" class="select-field" placeholder="Ej: 35123456" required autocomplete="off">
                    </div>

                    <div class="form-group">
                        <label for="c-nombre">Nombre Completo o Razón Social:</label>
                        <input type="text" id="c-nombre" class="select-field" placeholder="Ej: Juan Pérez" required autocomplete="off">
                    </div>

                    <div class="form-group">
                        <label for="c-telefono">Teléfono de Contacto (Alertas SMS):</label>
                        <input type="tel" id="c-telefono" class="select-field" placeholder="Ej: 1123456789" required autocomplete="off">
                    </div>

                    <div class="form-group">
                        <label for="c-direccion">Dirección Estructurada de Entrega:</label>
                        <input type="text" id="c-direccion" class="select-field" placeholder="Calle, Altura, Localidad (Martinez)" required autocomplete="off">
                    </div>

                    <div class="form-group group-segmentacion-tactica" style="display: flex; flex-direction: column; gap: 0.65rem; background-color: #1e293b; padding: 0.75rem; border-radius: 6px; border: 1px solid #334155; margin-top: 0.25rem;">
                        <span style="font-size: 0.8rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px;">Segmentación de Cuenta:</span>
                        
                        <label class="checkbox-row" style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; font-size: 0.85rem; color: #f8fafc; font-weight: 600;">
                            <input type="checkbox" id="c-is-premium" style="width: 16px; height: 16px; accent-color: #eab308;">
                            <span>⭐ Cuenta Cliente Premium (Alta Prioridad / Corporativo)</span>
                        </label>

                        <label class="checkbox-row" style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; font-size: 0.85rem; color: #f8fafc; font-weight: 600;">
                            <input type="checkbox" id="c-is-critico" style="width: 16px; height: 16px; accent-color: #ef4444;">
                            <span>⚠️ Cuenta Cliente Crítico (Historial de Reclamos / Faltantes)</span>
                        </label>
                    </div>

                    <div class="action-buttons-group" style="display: flex; gap: 0.75rem; margin-top: 0.75rem;">
                        <button type="submit" id="btn-guardar-cliente" class="btn-primary w-100">Guardar Cliente en Base</button>
                        <button type="button" id="btn-cancelar-edicion" class="btn-secondary" style="display: none;">Cancelar</button>
                    </div>
                </form>
            </section>

            <section class="card-panel" aria-labelledby="lista-clientes-title">
                <h3 id="lista-clientes-title" class="section-title">Fichero Base de Clientes</h3>
                
                <div class="search-box" style="margin-bottom: 0.5rem;">
                    <input type="search" id="search-cliente" class="select-field" placeholder="🔍 Filtrar por DNI, Nombre o Dirección en tiempo real...">
                </div>

                <div id="listado-master-clientes" class="list-scroll-box" role="region" aria-live="polite" style="max-height: calc(100vh - 300px); overflow-y: auto; display: flex; flex-direction: column; gap: 0.75rem;">
                    </div>
            </section>

        </div>
    </main>

    <script type="module" src="../js/controllers/clientesController.js"></script>
</body>
</html>
