<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Martinez Routing - Fichero Maestro de Clientes</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="../css/main.css">
</head>
<body>

    <header class="app-header">
        <nav class="app-navbar" aria-label="Navegación del sistema">
            <div class="app-navbar__brand">Martinez Routing Clientes</div>
            <div class="app-navbar__menu">
                <a href="../index.html" class="app-navbar__link">Inicio</a>
                <a href="dashboard.html" class="app-navbar__link">Panel de Carga</a>
                <a href="shipping.html" class="app-navbar__link">Consola Mapa</a>
                <a href="transporte.html" class="app-navbar__link">Flota</a>
                <a href="clientes.html" class="app-navbar__link app-navbar__link--active" aria-current="page">Clientes</a>
                <a href="administracion.html" class="app-navbar__link">Seguridad</a>
            </div>
        </nav>
    </header>

    <main class="dashboard-container">
        <div class="grid-two-columns">
            
            <section class="card-panel" aria-labelledby="form-clientes-title">
                <h3 id="form-clientes-title" class="card-panel__title">Registro Maestro de Clientes</h3>
                <p class="instruction-text">Fichero centralizado de cuentas de entrega. La geocodificación se procesa en segundo plano.</p>
                
                <form id="form-cliente-operativo" class="form-vertical">
                    <input type="hidden" id="cliente-id-hidden">

                    <div class="form-group">
                        <label for="c-dni" class="form-group__label">Documento Nacional de Identidad (DNI):</label>
                        <input type="text" id="c-dni" class="form-group__input" placeholder="Ej: 35123456" required autocomplete="off">
                    </div>

                    <div class="form-group">
                        <label for="c-nombre" class="form-group__label">Nombre Completo o Razón Social:</label>
                        <input type="text" id="c-nombre" class="form-group__input" placeholder="Ej: Juan Pérez" required autocomplete="off">
                    </div>

                    <div class="form-group">
                        <label for="c-telefono" class="form-group__label">Teléfono de Contacto (Alertas SMS):</label>
                        <input type="tel" id="c-telefono" class="form-group__input" placeholder="Ej: 1123456789" required autocomplete="off">
                    </div>

                    <div class="form-group">
                        <label for="c-direccion" class="form-group__label">Dirección Estructurada de Entrega:</label>
                        <input type="text" id="c-direccion" class="form-group__input" placeholder="Calle, Altura, Localidad (Martinez)" required autocomplete="off">
                    </div>

                    <div class="form-group">
                        <label class="form-group__label"><strong>Verificación de Ubicación en Mapa (Arrastre el pin si es incorrecto):</strong></label>
                        <div id="mapa-auxiliar-cliente" class="clientes-manager__map-wrapper"></div>
                    </div>

                    <div class="form-group clientes-manager__segmentation-box">
                        <span class="clientes-manager__segmentation-title">Segmentación de Cuenta:</span>
                        
                        <label class="clientes-manager__checkbox-label">
                            <input type="checkbox" id="c-is-premium">
                            <span>⭐ Cuenta Cliente Premium (Alta Prioridad / Corporativo)</span>
                        </label>

                        <label class="clientes-manager__checkbox-label">
                            <input type="checkbox" id="c-is-critico">
                            <span>⚠️ Cuenta Cliente Crítico (Historial de Reclamos / Faltantes)</span>
                        </label>
                    </div>

                    <div class="action-buttons-group">
                        <button type="submit" id="btn-guardar-cliente" class="btn-primary">Guardar Cliente en Base</button>
                        <button type="button" id="btn-cancelar-edicion" class="btn-primary" style="display: none; background-color: #475569;">Cancelar</button>
                    </div>
                </form>
            </section>

            <section class="card-panel" aria-labelledby="lista-clientes-title">
                <h3 id="lista-clientes-title" class="card-panel__title">Fichero Base de Clientes</h3>
                
                <div class="search-box">
                    <input type="search" id="search-cliente" class="form-group__input" placeholder="🔍 Filtrar por DNI, Nombre o Dirección en tiempo real..." aria-label="Filtrar fichero de clientes">
                </div>

                <div id="listado-master-clientes" class="list-scroll-box" role="region" aria-live="polite">
                    </div>
            </section>

        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="../js/app.js"></script>
    <script type="module" src="../js/controllers/clientesController.js"></script>
</body>
</html>
