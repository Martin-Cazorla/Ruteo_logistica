<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Martinez Routing - Acceso Operativo</title>
    <link rel="stylesheet" href="../css/main.css">
</head>
<body style="background-color: #0f172a; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;">

    <main class="card-panel" style="width: 100%; max-width: 420px; padding: 2.5rem; box-shadow: 0 10px 25px rgba(0,0,0,0.4);">
        <header style="text-align: center; margin-bottom: 2rem;">
            <h1 class="panel-title" style="font-size: 1.75rem; margin: 0 0 0.5rem 0; color: #f8fafc;">Martinez Routing</h1>
            <p class="instruction-text" style="margin: 0;">Consola de Autenticación Centralizada</p>
        </header>

        <form id="form-login" autocomplete="on">
            <div style="display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.25rem;">
                <label for="login-email" style="color: #94a3b8; font-size: 0.9rem; font-weight: 500;">Correo Electrónico Corp:</label>
                <input type="email" id="login-email" class="select-field" placeholder="ejemplo@martinez.com" required autocomplete="email" />
            </div>

            <div style="display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.5rem;">
                <label for="login-password" style="color: #94a3b8; font-size: 0.9rem; font-weight: 500;">Contraseña de Seguridad:</label>
                <input type="password" id="login-password" class="select-field" placeholder="••••••••" required autocomplete="current-password" />
            </div>

            <div id="login-error-msg" aria-live="polite" style="color: #ef4444; font-size: 0.875rem; margin-bottom: 1rem; display: none;">
                </div>

            <button type="submit" id="btn-login-submit" class="btn-primary" style="width: 100%; justify-content: center; padding: 0.75rem;">
                Validar Credenciales
            </button>
        </form>
    </main>

    <script type="module" src="../js/controllers/loginController.js"></script>
</body>
</html>
