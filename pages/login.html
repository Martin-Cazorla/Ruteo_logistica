<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Martinez Routing - Acceso Operativo</title>
    <link rel="stylesheet" href="../css/main.css">
</head>
<body class="login-view">

    <main class="login-view__container card-panel">
        <header class="login-view__header">
            <h1 class="login-view__title">Martinez Routing</h1>
            <p class="login-view__subtitle">Consola de Autenticación Centralizada</p>
        </header>

        <form id="form-login" autocomplete="on" novalidate>
            <div class="form-group">
                <label for="login-email" class="form-group__label">Correo Electrónico Corp:</label>
                <input 
                    type="email" 
                    id="login-email" 
                    class="form-group__input" 
                    placeholder="ejemplo@martinez.com" 
                    required 
                    autocomplete="email" 
                    inputmode="email"
                />
            </div>

            <div class="form-group form-group--last">
                <label for="login-password" class="form-group__label">Contraseña de Seguridad:</label>
                <input 
                    type="password" 
                    id="login-password" 
                    class="form-group__input" 
                    placeholder="••••••••" 
                    required 
                    autocomplete="current-password" 
                />
            </div>

            <div 
                id="login-error-msg" 
                class="login-view__error-container" 
                aria-live="assertive" 
                aria-hidden="true"
            ></div>

            <button type="submit" id="btn-login-submit" class="btn-primary">
                Validar Credenciales
            </button>
        </form>
    </main>

    <script type="module" src="../js/controllers/loginController.js"></script>
</body>
</html>
