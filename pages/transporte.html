<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Martinez Routing - Gestión de Flota Central</title>
    <link rel="stylesheet" href="../css/main.css">
</head>
<body>

    <header class="app-header">
        <nav class="app-navbar" aria-label="Navegación del sistema">
            <div class="brand-title">Martinez Routing Flota</div>
            <div class="dashboard-counters">
                <a href="../index.html" class="badge badge--info">Inicio</a>
                <a href="dashboard.html" class="badge badge--info">Panel de Carga</a>
                <a href="shipping.html" class="badge badge--info">Consola Mapa</a>
                <a href="transporte.html" class="badge badge--info badge--active">Flota</a>
                <a href="administracion.html" class="badge badge--info">Seguridad</a>
            </div>
        </nav>
    </header>

    <main class="dashboard-container">
        <div class="grid-two-columns">
            
            <section class="card-panel" aria-labelledby="form-flota-title">
                <h2 id="form-flota-title" class="section-title">Alta de Unidad Nueva (Fichero Maestro)</h2>
                <p class="instruction-text">Registre los camiones estables que integran la flota de distribución central corporativa.</p>
                
                <form id="form-alta-transporte" class="form-vertical">
                    <div class="form-group">
                        <label for="t-numero-unidad">Número de Unidad (Interno Fijo):</label>
                        <input type="text" id="t-numero-unidad" class="select-field" placeholder="Ej: 99" required>
                    </div>
                    <div class="form-group">
                        <label for="t-modelo-unidad">Modelo del Vehículo:</label>
                        <input type="text" id="t-modelo-unidad" class="select-field" placeholder="Ej: Renault Master 2.5 DCI" required>
                    </div>
                    <div class="form-group">
                        <label for="t-nombre-chofer">Nombre y Apellido del Chofer:</label>
                        <input type="text" id="t-nombre-chofer" class="select-field" placeholder="Ej: Carlos Vitale" required>
                    </div>
                    <div class="form-group">
                        <label for="t-tamanio-unidad">Capacidad / Tamaño de Carga:</label>
                        <select id="t-tamanio-unidad" class="select-field" required>
                            <option value="Chico">Chico (Furgón)</option>
                            <option value="Mediano">Mediano (Chasis)</option>
                            <option value="Grande">Grande (Balancín / Master)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="t-comentarios-unidad">Historial de Observaciones / Reclamos de la Unidad:</label>
                        <textarea id="t-comentarios-unidad" class="select-field" rows="4" placeholder="Detalles de mantenimiento, estado mecánico o reclamos permanentes de la unidad..."></textarea>
                    </div>
                    <button type="submit" class="btn-primary w-100">Guardar en Fichero Global</button>
                </form>
            </section>

            <section class="card-panel" aria-labelledby="list-flota-title">
                <h2 id="list-flota-title" class="section-title">Fichero General de Flota Activa</h2>
                <div class="search-box">
                    <input type="search" id="search-flota" class="select-field" placeholder="Buscar por número de interno, modelo o chofer...">
                </div>
                <div id="listado-flota-maestra" class="list-scroll-box">
                    </div>
            </section>

        </div>
    </main>

    <script type="module" src="../js/controllers/transporteController.js"></script>
</body>
</html>
